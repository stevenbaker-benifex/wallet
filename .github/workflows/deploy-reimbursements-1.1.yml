name: Deploy reimbursements-1.1

on:
  push:
    branches:
      - main
    paths:
      - 'wallet/ee/reimbursements-1.1/**'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wallet/ee/reimbursements-1.1/package-lock.json

      - name: Install dependencies
        working-directory: wallet/ee/reimbursements-1.1
        run: npm ci

      - name: Build
        working-directory: wallet/ee/reimbursements-1.1
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: wallet/ee/reimbursements-1.1/dist
          destination_dir: wallet/ee/reimbursements-1.1
          keep_files: true
